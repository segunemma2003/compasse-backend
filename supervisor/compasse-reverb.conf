[program:compasse-reverb]
process_name=%(program_name)s
command=php /var/www/compasse-backend/artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
autostart=true
autorestart=true
user=deploy
redirect_stderr=true
stdout_logfile=/var/www/compasse-backend/storage/logs/reverb.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=60
