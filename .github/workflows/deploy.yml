name: Deploy Compasse Backend

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "20"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: compasse_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, redis, gd, zip, curl, xml, bcmath, soap, intl, readline, libxml, openssl, pdo, pdo_mysql, tokenizer, xmlwriter, xmlreader, sodium, iconv, json, filter, hash, session, standard, mysqlnd, pcre, spl, sqlite3, pdo_sqlite, zlib, calendar, ctype, exif, ffi, ftp, gettext, gmp, imap, ldap, odbc, pcntl, pdo_odbc, pdo_pgsql, pgsql, shmop, snmp, sockets, sysvmsg, sysvsem, sysvshm, tidy, xmlrpc, xsl, zip, zlib
          coverage: xdebug

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Install Node dependencies
        run: npm ci

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate key
        run: php artisan key:generate

      - name: Directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create SQLite database file
        run: |
          touch database/database.sqlite
          chmod 666 database/database.sqlite

      - name: Create MySQL databases
        run: |
          mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e "CREATE DATABASE IF NOT EXISTS compasse_test;"
          mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e "CREATE DATABASE IF NOT EXISTS compasse_central;"

      - name: Execute tests
        run: |
          # Ensure database exists before clearing cache
          if [ ! -f database/database.sqlite ]; then
            touch database/database.sqlite
            chmod 666 database/database.sqlite
          fi
          # Set testing environment
          export APP_ENV=testing
          export DB_CONNECTION=sqlite
          export DB_DATABASE=database/database.sqlite
          # Run migrations first to create tables
          php artisan migrate --env=testing --force
          # Then clear caches
          php artisan config:clear
          php artisan cache:clear
          # Run tests using vendor PHPUnit directly
          ./vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 180s
          command_timeout: 1800s
          script: |
            export PROJECT_DIR="${{ secrets.PROJECT_PATH || '/var/www/compasse-backend' }}"
            export CERTBOT_EMAIL="${{ secrets.CERTBOT_EMAIL }}"
            export CF_Token="${{ secrets.CF_Token }}"
            cd "$PROJECT_DIR"
            git config --global --add safe.directory "$PROJECT_DIR"
            git pull origin main || git pull origin master || true
            bash scripts/ci-deploy-production.sh

      - name: Health Check
        continue-on-error: true
        run: |
          echo "Checking API health over HTTPS (no SSH needed)..."
          for attempt in $(seq 1 8); do
            if curl -sf --max-time 15 "https://api.compasse.net/api/health" | grep -q '"status"'; then
              echo "✅ API is healthy"
              exit 0
            fi
            echo "Attempt $attempt/8 — waiting 10s..."
            sleep 10
          done
          echo "⚠️  Health check did not pass (deploy may still have succeeded)"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Backend deployed successfully from ${{ github.ref_name }} @ ${{ github.sha }}"
          else
            echo "❌ Backend deployment failed for ${{ github.ref_name }} @ ${{ github.sha }}"
          fi

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: |
          composer audit
          npm audit --audit-level moderate

      - name: Run PHP security check
        run: |
          composer require --dev enlightn/security-checker
          ./vendor/bin/security-checker security:check

  performance-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: Performance test
        run: |
          # Test API response times
          ./vendor/bin/phpunit --filter=PerformanceTest

          # Test database performance (if seeder exists)
          php artisan db:seed --class=PerformanceTestSeeder || echo "PerformanceTestSeeder not found, skipping..."

          # Run performance benchmarks (if command exists)
          php artisan benchmark:run || echo "benchmark:run command not found, skipping..."
