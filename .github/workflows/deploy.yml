name: Deploy Compasse Backend

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "20"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: compasse_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, redis, gd, zip, curl, xml, bcmath, soap, intl, readline, libxml, openssl, pdo, pdo_mysql, tokenizer, xmlwriter, xmlreader, sodium, iconv, json, filter, hash, session, standard, mysqlnd, pcre, spl, sqlite3, pdo_sqlite, zlib, calendar, ctype, exif, ffi, ftp, gettext, gmp, imap, ldap, odbc, pcntl, pdo_odbc, pdo_pgsql, pgsql, shmop, snmp, sockets, sysvmsg, sysvsem, sysvshm, tidy, xmlrpc, xsl, zip, zlib
          coverage: xdebug

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Install Node dependencies
        run: npm ci

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate key
        run: php artisan key:generate

      - name: Directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create SQLite database file
        run: |
          touch database/database.sqlite
          chmod 666 database/database.sqlite

      - name: Create MySQL databases
        run: |
          mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e "CREATE DATABASE IF NOT EXISTS compasse_test;"
          mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e "CREATE DATABASE IF NOT EXISTS compasse_central;"

      - name: Execute tests
        run: |
          # Ensure database exists before clearing cache
          if [ ! -f database/database.sqlite ]; then
            touch database/database.sqlite
            chmod 666 database/database.sqlite
          fi
          # Set testing environment
          export APP_ENV=testing
          export DB_CONNECTION=sqlite
          export DB_DATABASE=database/database.sqlite
          # Run migrations first to create tables
          php artisan migrate --env=testing --force
          # Then clear caches
          php artisan config:clear
          php artisan cache:clear
          # Run tests using vendor PHPUnit directly
          ./vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, redis, gd, zip, curl, xml, bcmath, soap, intl, readline, libxml, openssl, pdo, pdo_mysql, tokenizer, xmlwriter, xmlreader, sodium, iconv, json, filter, hash, session, standard, mysqlnd, pcre, spl, sqlite3, pdo_sqlite, zlib, calendar, ctype, exif, ffi, ftp, gettext, gmp, imap, ldap, odbc, pcntl, pdo_odbc, pdo_pgsql, pgsql, shmop, snmp, sockets, sysvmsg, sysvsem, sysvshm, tidy, xmlrpc, xsl, zip, zlib

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci

      - name: Build assets
        run: |
          npm run build

      - name: Setup SSH key for deployment
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SERVER_PORT || 22 }} -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          PROJECT_DIR: ${{ secrets.PROJECT_PATH || '/var/www/compasse-backend' }}
          REPO_URL: ${{ secrets.REPO_URL }}
          CERTBOT_EMAIL: ${{ secrets.CERTBOT_EMAIL }}
          CF_Token: ${{ secrets.CF_Token }}
        run: |
          for attempt in 1 2 3 4 5; do
            echo "========================================="
            echo "Deploy SSH attempt $attempt/5"
            echo "========================================="
            if ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
                 -o ConnectTimeout=90 \
                 -o ServerAliveInterval=30 \
                 -o ServerAliveCountMax=10 \
                 -o StrictHostKeyChecking=no \
                 "$SERVER_USER@$SERVER_HOST" \
                 "export PROJECT_DIR='$PROJECT_DIR' REPO_URL='$REPO_URL' CERTBOT_EMAIL='$CERTBOT_EMAIL' CF_Token='$CF_Token'; bash -s" \
                 < scripts/ci-deploy-production.sh; then
              echo "✅ Deploy succeeded on attempt $attempt"
              exit 0
            fi
            echo "⚠️  SSH/deploy attempt $attempt failed — waiting 45s..."
            sleep 45
          done
          echo "❌ Deploy failed: server unreachable via SSH after 5 attempts"
          exit 1

      # Give nginx/php-fpm/supervisor time to fully restart before opening a new SSH connection.
      - name: Wait for services to stabilise
        run: sleep 25

      - name: Health Check
        continue-on-error: true
        env:
          APP_URL: ${{ secrets.APP_URL }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || 22 }}
          PROJECT_DIR: ${{ secrets.PROJECT_PATH || '/var/www/compasse-backend' }}
        run: |
          for attempt in 1 2 3; do
            if ssh -i ~/.ssh/deploy_key -p "$SERVER_PORT" \
                 -o ConnectTimeout=60 -o StrictHostKeyChecking=no \
                 "$SERVER_USER@$SERVER_HOST" \
                 "export APP_URL='$APP_URL' PROJECT_DIR='$PROJECT_DIR'; bash -s" \
                 < scripts/ci-health-check.sh; then
              exit 0
            fi
            sleep 20
          done
          echo "⚠️  Health check SSH failed (non-fatal)"
          exit 0

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Backend deployed successfully from ${{ github.ref_name }} @ ${{ github.sha }}"
          else
            echo "❌ Backend deployment failed for ${{ github.ref_name }} @ ${{ github.sha }}"
          fi

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: |
          composer audit
          npm audit --audit-level moderate

      - name: Run PHP security check
        run: |
          composer require --dev enlightn/security-checker
          ./vendor/bin/security-checker security:check

  performance-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: Performance test
        run: |
          # Test API response times
          ./vendor/bin/phpunit --filter=PerformanceTest

          # Test database performance (if seeder exists)
          php artisan db:seed --class=PerformanceTestSeeder || echo "PerformanceTestSeeder not found, skipping..."

          # Run performance benchmarks (if command exists)
          php artisan benchmark:run || echo "benchmark:run command not found, skipping..."
