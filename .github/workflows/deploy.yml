name: Deploy Compasse Backend

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "20"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: compasse_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, redis, gd, zip, curl, xml, bcmath, soap, intl, readline, libxml, openssl, pdo, pdo_mysql, tokenizer, xmlwriter, xmlreader, sodium, iconv, json, filter, hash, session, standard, mysqlnd, pcre, spl, sqlite3, pdo_sqlite, zlib, calendar, ctype, exif, ffi, ftp, gettext, gmp, imap, ldap, odbc, pcntl, pdo_odbc, pdo_pgsql, pgsql, shmop, snmp, sockets, sysvmsg, sysvsem, sysvshm, tidy, xmlrpc, xsl, zip, zlib
          coverage: xdebug

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Install Node dependencies
        run: npm ci

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate key
        run: php artisan key:generate

      - name: Directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create SQLite database file
        run: |
          touch database/database.sqlite
          chmod 666 database/database.sqlite

      - name: Create MySQL databases
        run: |
          mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e "CREATE DATABASE IF NOT EXISTS compasse_test;"
          mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e "CREATE DATABASE IF NOT EXISTS compasse_central;"

      - name: Execute tests
        run: |
          # Ensure database exists before clearing cache
          if [ ! -f database/database.sqlite ]; then
            touch database/database.sqlite
            chmod 666 database/database.sqlite
          fi
          # Set testing environment
          export APP_ENV=testing
          export DB_CONNECTION=sqlite
          export DB_DATABASE=database/database.sqlite
          # Run migrations first to create tables
          php artisan migrate --env=testing --force
          # Then clear caches
          php artisan config:clear
          php artisan cache:clear
          # Run tests using vendor PHPUnit directly
          ./vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, redis, gd, zip, curl, xml, bcmath, soap, intl, readline, libxml, openssl, pdo, pdo_mysql, tokenizer, xmlwriter, xmlreader, sodium, iconv, json, filter, hash, session, standard, mysqlnd, pcre, spl, sqlite3, pdo_sqlite, zlib, calendar, ctype, exif, ffi, ftp, gettext, gmp, imap, ldap, odbc, pcntl, pdo_odbc, pdo_pgsql, pgsql, shmop, snmp, sockets, sysvmsg, sysvsem, sysvshm, tidy, xmlrpc, xsl, zip, zlib

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          npm ci

      - name: Build assets
        run: |
          npm run build

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 30s
          command_timeout: 10s
          script: |
            echo "✅ SSH connection successful!"
            echo "📍 Server: ${{ secrets.SERVER_HOST }}"
            echo "👤 User: ${{ secrets.SERVER_USER }}"
            echo "🖥️  Hostname: $(hostname)"
            echo "📅 Date: $(date)"
            echo "💾 Disk space:"
            df -h | head -5

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 300s
          command_timeout: 600s
          script: |
            set -e  # Exit on error
            set -x  # Print commands as they execute

            echo "========================================="
            echo "🚀 Starting Deployment Process"
            echo "========================================="

            # Set project directory and repository URL
            PROJECT_DIR="${{ secrets.PROJECT_PATH || '/var/www/compasse-backend' }}"
            # Use REPO_URL secret if provided, otherwise construct from github.repository
            REPO_URL="${{ secrets.REPO_URL }}"
            if [ -z "$REPO_URL" ]; then
              REPO_URL="git@github-backend:segunemma2003/compasse-backend.git"
            fi

            echo "📁 Project Directory: $PROJECT_DIR"
            echo "🔗 Repository URL: $REPO_URL"

            # Create directory if it doesn't exist
            if [ ! -d "$PROJECT_DIR" ]; then
              echo "📂 Project directory does not exist. Creating directory..."
              sudo mkdir -p "$PROJECT_DIR"
              sudo chown -R $USER:$USER "$PROJECT_DIR"
              echo "✅ Directory created: $PROJECT_DIR"
            else
              echo "✅ Project directory exists: $PROJECT_DIR"
            fi

            # Fix ownership so the deploy user can run git commands
            sudo chown -R $USER:$USER "$PROJECT_DIR"

            # Ensure GitHub's host key is trusted (needed for SSH alias → github.com)
            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null
            chmod 600 ~/.ssh/known_hosts

            # Navigate to project directory
            cd "$PROJECT_DIR"
            echo "📍 Current directory: $(pwd)"

            # Check if it's a git repository
            if [ ! -d ".git" ]; then
              echo "📥 Not a git repository. Cloning repository..."
              echo "🔗 Repository URL: $REPO_URL"

              # Clone the repository
              if [[ "$REPO_URL" == *"@"* ]] || [[ "$REPO_URL" == *"git@"* ]]; then
                # SSH format
                echo "🔑 Using SSH format for cloning..."
                git clone "$REPO_URL" .
              else
                # HTTPS format - ensure it has .git extension
                echo "🔐 Using HTTPS format for cloning..."
                if [[ "$REPO_URL" != *".git" ]]; then
                  REPO_URL="${REPO_URL}.git"
                fi
                git clone "$REPO_URL" .
              fi

              # Verify clone was successful
              if [ $? -eq 0 ]; then
                echo "✅ Repository cloned successfully"
              else
                echo "❌ ERROR: Failed to clone repository. Please check REPO_URL secret."
                exit 1
              fi
            else
              echo "📥 Existing git repository found. Pulling latest changes..."
              git config --global --add safe.directory "$PROJECT_DIR"
              git remote set-url origin git@github-backend:segunemma2003/compasse-backend.git
              git pull origin main || git pull origin master
              if [ $? -eq 0 ]; then
                echo "✅ Code updated successfully"
              else
                echo "⚠️  Warning: Git pull had issues, but continuing..."
              fi
            fi

            echo "========================================="
            echo "📦 Installing Dependencies"
            echo "========================================="

            # Install/update dependencies
            echo "📦 Installing Composer dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction
            echo "✅ Composer dependencies installed"

            echo "📦 Installing NPM dependencies..."
            npm ci
            echo "✅ NPM dependencies installed"

            # Build assets
            echo "========================================="
            echo "🔨 Building Assets"
            echo "========================================="
            npm run build
            echo "✅ Assets built successfully"

            # Optional: Clean up node_modules after build to save space
            # npm prune --production

            # Ensure deploy user can write to storage and cache before artisan runs
            sudo chmod -R 775 storage bootstrap/cache
            sudo chown -R $USER:www-data storage bootstrap/cache

            # Clear and cache configuration
            echo "========================================="
            echo "🧹 Clearing Caches"
            echo "========================================="
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear
            echo "✅ Caches cleared"

            # Cache for production
            echo "========================================="
            echo "💾 Caching for Production"
            echo "========================================="
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "✅ Production caches created"

            # Run main database migrations
            echo "========================================="
            echo "🗄️  Running Database Migrations"
            echo "========================================="
            php artisan migrate --force
            echo "✅ Main database migrations completed"

            # Seed super admin (skips if already exists)
            echo "========================================="
            echo "👤 Seeding Super Admin"
            echo "========================================="
            php artisan db:seed --class=SuperAdminSeeder
            echo "✅ Super admin seeder completed"

            # Create storage link
            echo "🔗 Creating storage symlink..."
            php artisan storage:link
            echo "✅ Storage link created"

            # Set final permissions for PHP-FPM (www-data) to serve files
            echo "========================================="
            echo "🔐 Setting Permissions"
            echo "========================================="
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            echo "✅ Permissions set"

            # Setup multi-tenant databases
            echo "========================================="
            echo "🏢 Setting Up Multi-Tenant Databases"
            echo "========================================="

            # Get all tenants and create their databases
            php artisan tinker --execute="
            \$tenants = App\Models\Tenant::all();
            foreach (\$tenants as \$tenant) {
                try {
                    // Check if database already exists
                    \$databaseName = \$tenant->database_name;
                    \$databaseExists = DB::select('SELECT SCHEMA_NAME FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME = ?', [\$databaseName]);

                    if (empty(\$databaseExists)) {
                        // Create tenant database only if it doesn't exist
                        DB::statement('CREATE DATABASE ' . \$databaseName . ' CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci');
                        echo 'Created new database: ' . \$databaseName;
                    } else {
                        echo 'Database already exists: ' . \$databaseName;
                    }

                    // Configure tenant connection
                    config(['database.connections.tenant' => [
                        'driver' => 'mysql',
                        'host' => env('DB_HOST', '127.0.0.1'),
                        'port' => env('DB_PORT', '3306'),
                        'database' => \$databaseName,
                        'username' => \$tenant->database_username,
                        'password' => \$tenant->database_password,
                        'charset' => 'utf8mb4',
                        'collation' => 'utf8mb4_unicode_ci',
                    ]]);

                    // Run tenant migrations (only if needed)
                    try {
                        Artisan::call('migrate', [
                            '--database' => 'tenant',
                            '--force' => true,
                            '--path' => 'database/migrations/tenant'
                        ]);
                        echo ' - Migrations completed for ' . \$databaseName;
                    } catch (Exception \$migrationError) {
                        echo ' - Migration error for ' . \$databaseName . ': ' . \$migrationError->getMessage();
                    }

                    echo ' - Tenant database ' . \$databaseName . ' setup completed';
                } catch (Exception \$e) {
                    echo 'Error setting up tenant ' . \$tenant->name . ': ' . \$e->getMessage();
                }
            }
            "

            # Setup SSL for api.compasse.net if not already configured
            echo "========================================="
            echo "🔒 Setting up SSL for api.compasse.net"
            echo "========================================="
            echo "📝 Installing Certbot if needed..."
            if ! command -v certbot &> /dev/null; then
                sudo apt-get update -qq
                sudo apt-get install -y certbot python3-certbot-nginx
            fi

            echo "📋 Updating Nginx configuration for api.compasse.net..."
            if [ -f "nginx-api-compasse.conf" ]; then
                sudo cp /etc/nginx/sites-available/compasse-backend "/etc/nginx/sites-available/compasse-backend.bak.$(date +%Y%m%d%H%M%S)" || true
                sudo cp nginx-api-compasse.conf /etc/nginx/sites-available/compasse-backend
                sudo ln -sf /etc/nginx/sites-available/compasse-backend /etc/nginx/sites-enabled/compasse-backend
                echo "✅ Nginx configuration for api.compasse.net updated"
            else
                echo "⚠️  nginx-api-compasse.conf not found, skipping Nginx config update"
            fi

            echo "🧪 Testing Nginx configuration..."
            sudo nginx -t

            echo "🔄 Reloading Nginx..."
            sudo systemctl reload nginx

            echo "🔑 Ensuring SSL certificate for api.compasse.net..."
            if [ ! -d "/etc/letsencrypt/live/api.compasse.net" ]; then
                sudo certbot --nginx -d api.compasse.net --non-interactive --agree-tos --email ${CERTBOT_EMAIL:-admin@compasse.net} || echo "⚠️  Certbot SSL setup encountered an issue"
            else
                sudo certbot renew --quiet || echo "⚠️  Certificate renewal skipped"
            fi

            # Restart services
            echo "========================================="
            echo "🔄 Restarting Services"
            echo "========================================="
            echo "🌐 Restarting Nginx..."
            sudo systemctl restart nginx
            echo "✅ Nginx restarted"

            echo "🐘 Restarting PHP-FPM..."
            sudo systemctl restart php8.4-fpm
            echo "✅ PHP-FPM restarted"

            # Start/restart queue workers
            echo "👷 Restarting queue workers..."
            sudo supervisorctl restart compasse-worker:* || echo "⚠️  Queue workers may not be configured"
            echo "✅ Queue workers restarted"

            echo "📊 Restarting Horizon..."
            sudo supervisorctl restart compasse-horizon:* || echo "⚠️  Horizon may not be configured"
            echo "✅ Horizon restarted"

            # Clear application cache
            echo "🧹 Clearing application cache..."
            php artisan cache:clear
            php artisan queue:restart
            echo "✅ Application cache cleared"

            echo "========================================="
            echo "✅ Deployment completed successfully!"
            echo "========================================="

      - name: Health Check
        uses: appleboy/ssh-action@v1.0.0
        env:
          APP_URL: ${{ secrets.APP_URL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 300s
          command_timeout: 300s
          envs: APP_URL
          script: |
            set -e  # Exit on error

            cd ${{ secrets.PROJECT_PATH || '/var/www/compasse-backend' }}

            echo "========================================="
            echo "🏥 Health Check - Verifying Deployment"
            echo "========================================="

            # Wait for services to start
            echo "⏳ Waiting for services to start..."
            sleep 10

            # Health check function with retry
            check_health() {
              local url=$1
              local name=$2
              local max_attempts=5
              local attempt=1

              echo "🔍 Checking $name..."

              while [ $attempt -le $max_attempts ]; do
                echo "   Attempt $attempt/$max_attempts: $url"

                # Get response and status code
                response=$(curl -s -w "\n%{http_code}" -m 10 -H "Host: api.compasse.net" "$url" || echo -e "\n000")
                http_code=$(echo "$response" | tail -n1)
                body=$(echo "$response" | head -n-1)

                if [ "$http_code" = "200" ]; then
                  echo "   ✅ $name is healthy! (HTTP $http_code)"
                  echo "   Response: $body"
                  return 0
                else
                  echo "   ⚠️  Attempt $attempt failed (HTTP $http_code), retrying in 5 seconds..."
                  sleep 5
                  attempt=$((attempt + 1))
                fi
              done

              echo "   ❌ $name failed after $max_attempts attempts"
              return 1
            }

            # Check localhost health endpoints
            echo "========================================="
            echo "🌐 Checking Local Health Endpoints"
            echo "========================================="

            # Use localhost with Host header to bypass DNS propagation issues
            check_health "http://127.0.0.1/api/health" "API Health (localhost)"
            check_health "http://127.0.0.1/api/v1/health" "API v1 Health (localhost)" || echo "⚠️  v1 health endpoint may not exist, continuing..."

            # Check public URL if configured
            if [ ! -z "$APP_URL" ]; then
              echo "========================================="
              echo "🌍 Checking Public Health Endpoints"
              echo "========================================="
              echo "📡 Public URL: $APP_URL"

              # Remove trailing slash
              APP_URL="${APP_URL%/}"

              check_health "${APP_URL}/api/health" "API Health (public)"
              check_health "${APP_URL}/api/v1/health" "API v1 Health (public)" || echo "⚠️  v1 health endpoint may not exist, continuing..."
            else
              echo "ℹ️  APP_URL not configured, skipping public health check"
              echo "   To enable public health checks, add APP_URL to GitHub secrets"
              echo "   Example: https://api.yourschool.com or http://your-server.com:8078"
            fi

            # Check queue workers
            echo "========================================="
            echo "👷 Checking Queue Workers"
            echo "========================================="
            php artisan queue:work --once --timeout=10 || echo "⚠️  Queue worker test completed (may be expected)"

            # Check Horizon
            echo "========================================="
            echo "📊 Checking Horizon"
            echo "========================================="
            php artisan horizon:status || echo "⚠️  Horizon status checked (may not be configured)"

            # Check database connection
            echo "========================================="
            echo "🗄️  Checking Database Connection"
            echo "========================================="
            php artisan tinker --execute="DB::connection()->getPdo(); echo '✅ Database connected successfully';" || exit 1

            # Check Redis connection
            echo "========================================="
            echo "🔴 Checking Redis Connection"
            echo "========================================="
            php artisan tinker --execute="Redis::ping(); echo '✅ Redis connected successfully';" || exit 1

            # Check New Relic (if configured)
            if [ ! -z "${{ secrets.NEW_RELIC_LICENSE_KEY }}" ]; then
              echo "========================================="
              echo "📈 Checking New Relic Integration"
              echo "========================================="
              php artisan tinker --execute="echo '✅ New Relic configured';"
            fi

            # Run comprehensive system test if available
            if [ -f "complete-system-test.php" ]; then
              echo "========================================="
              echo "🧪 Running Comprehensive System Test"
              echo "========================================="
              php complete-system-test.php || echo "⚠️  System test completed (warnings may be expected)"
            fi

            echo "========================================="
            echo "✅ All Health Checks Passed!"
            echo "========================================="
            echo ""
            echo "📋 Health Check Summary:"
            echo "   ✅ Local API Health: OK (https://api.compasse.net/api/health)"
            if [ ! -z "$APP_URL" ]; then
              echo "   ✅ Public API Health: OK (${APP_URL}/api/health)"
            else
              echo "   ℹ️  Public Health Check: Not configured"
            fi
            echo "   ✅ Database: Connected"
            echo "   ✅ Redis: Connected"
            echo "   ✅ Services: Running"
            echo ""
            echo "🎉 Deployment verified successfully!"
            echo ""
            echo "📡 Health Check URLs:"
            echo "   Local: https://api.compasse.net/api/health"
            if [ ! -z "$APP_URL" ]; then
              echo "   Public: ${APP_URL}/api/health"
            fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Backend deployed successfully from ${{ github.ref_name }} @ ${{ github.sha }}"
          else
            echo "❌ Backend deployment failed for ${{ github.ref_name }} @ ${{ github.sha }}"
          fi

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: |
          composer audit
          npm audit --audit-level moderate

      - name: Run PHP security check
        run: |
          composer require --dev enlightn/security-checker
          ./vendor/bin/security-checker security:check

  performance-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: Performance test
        run: |
          # Test API response times
          ./vendor/bin/phpunit --filter=PerformanceTest

          # Test database performance (if seeder exists)
          php artisan db:seed --class=PerformanceTestSeeder || echo "PerformanceTestSeeder not found, skipping..."

          # Run performance benchmarks (if command exists)
          php artisan benchmark:run || echo "benchmark:run command not found, skipping..."
