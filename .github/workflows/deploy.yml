name: Deploy Compasse Backend

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PHP_VERSION: "8.4"
  NODE_VERSION: "20"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: compasse_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, dom, fileinfo, mysql, redis, gd, zip, curl, xml, bcmath, soap, intl, readline, libxml, openssl, pdo, pdo_mysql, tokenizer, xmlwriter, xmlreader, sodium, iconv, json, filter, hash, session, standard, mysqlnd, pcre, spl, sqlite3, pdo_sqlite, zlib, calendar, ctype, exif, ffi, ftp, gettext, gmp, imap, ldap, odbc, pcntl, pdo_odbc, pdo_pgsql, pgsql, shmop, snmp, sockets, sysvmsg, sysvsem, sysvshm, tidy, xmlrpc, xsl, zip, zlib
          coverage: xdebug

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: Install Node dependencies
        run: npm ci

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate key
        run: php artisan key:generate

      - name: Directory permissions
        run: chmod -R 777 storage bootstrap/cache

      - name: Create SQLite database file
        run: |
          touch database/database.sqlite
          chmod 666 database/database.sqlite

      - name: Create MySQL databases
        run: |
          mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e "CREATE DATABASE IF NOT EXISTS compasse_test;"
          mysql --host 127.0.0.1 --port 3306 -uroot -ppassword -e "CREATE DATABASE IF NOT EXISTS compasse_central;"

      - name: Execute tests
        run: |
          # Ensure database exists before clearing cache
          if [ ! -f database/database.sqlite ]; then
            touch database/database.sqlite
            chmod 666 database/database.sqlite
          fi
          # Set testing environment
          export APP_ENV=testing
          export DB_CONNECTION=sqlite
          export DB_DATABASE=database/database.sqlite
          # Run migrations first to create tables
          php artisan migrate --env=testing --force
          # Then clear caches
          php artisan config:clear
          php artisan cache:clear
          # Run tests using vendor PHPUnit directly
          ./vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GitHub Actions runners often cannot reach VPS port 22 (datacenter IP blocks).
      # Trigger deploy over HTTPS — the server runs the script locally (same as manual SSH).
      - name: Trigger deploy via HTTPS webhook
        id: webhook
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "::error::DEPLOY_WEBHOOK_TOKEN secret is not set. Add it in GitHub repo secrets and in server .env."
            echo "triggered=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          ENDPOINTS=(
            "https://api.compasse.net/deploy-trigger.php"
            "${{ secrets.DEPLOY_WEBHOOK_URL || 'https://api.compasse.net/api/v1/internal/deploy' }}"
          )
          for url in "${ENDPOINTS[@]}"; do
            for attempt in 1 2 3; do
              echo "Trying $url (attempt $attempt/3)..."
              http_code=$(curl -s -o /tmp/deploy-response.json -w "%{http_code}" \
                -X POST "$url" \
                -H "X-Deploy-Token: $DEPLOY_TOKEN" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -d "{\"sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref_name }}\",\"actor\":\"${{ github.actor }}\"}" \
                --connect-timeout 20 --max-time 45)
              echo "HTTP $http_code"
              cat /tmp/deploy-response.json || true
              if [ "$http_code" = "202" ] || [ "$http_code" = "200" ]; then
                echo "triggered=true" >> "$GITHUB_OUTPUT"
                if [ "$url" = "https://api.compasse.net/deploy-trigger.php" ]; then
                  echo "status_url=https://api.compasse.net/deploy-trigger.php?action=status" >> "$GITHUB_OUTPUT"
                else
                  echo "status_url=${url%/deploy}/deploy/status" >> "$GITHUB_OUTPUT"
                fi
                exit 0
              fi
              sleep 10
            done
          done
          echo "triggered=false" >> "$GITHUB_OUTPUT"
          echo "::error::All deploy webhook URLs returned errors. Copy public/deploy-trigger.php to the server once via SSH/SCP."
          exit 1

      - name: Wait for deploy to finish
        if: steps.webhook.outputs.triggered == 'true'
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          STATUS_URL: ${{ steps.webhook.outputs.status_url }}
        run: |
          echo "Polling deploy status at $STATUS_URL (up to 25 min)..."
          for attempt in $(seq 1 50); do
            body=$(curl -sf --max-time 15 "$STATUS_URL" -H "X-Deploy-Token: $DEPLOY_TOKEN" 2>/dev/null || echo "")
            if echo "$body" | grep -q '"completed":true'; then
              echo "✅ Deploy finished on server"
              exit 0
            fi
            if echo "$body" | grep -q 'Deployment completed successfully'; then
              echo "✅ Deploy finished on server"
              exit 0
            fi
            echo "Attempt $attempt/50 — still running..."
            sleep 30
          done
          echo "::warning::Deploy did not report completion in time — check storage/logs/deploy-webhook.log on server"

      - name: Deploy via SSH (fallback only)
        if: failure()
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          timeout: 180s
          command_timeout: 1800s
          script: |
            export PROJECT_DIR="${{ secrets.PROJECT_PATH || '/var/www/compasse-backend' }}"
            export CERTBOT_EMAIL="${{ secrets.CERTBOT_EMAIL }}"
            export CF_Token="${{ secrets.CF_Token }}"
            cd "$PROJECT_DIR"
            git config --global --add safe.directory "$PROJECT_DIR"
            git pull origin main || git pull origin master || true
            bash scripts/ci-deploy-production.sh

      - name: Health Check
        continue-on-error: true
        run: |
          echo "Checking API health over HTTPS..."
          for attempt in $(seq 1 8); do
            if curl -sf --max-time 15 "https://api.compasse.net/api/health" | grep -q '"status"'; then
              echo "✅ API is healthy"
              exit 0
            fi
            echo "Attempt $attempt/8 — waiting 10s..."
            sleep 10
          done
          echo "⚠️  Health check did not pass (deploy may still have succeeded)"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Backend deployed successfully from ${{ github.ref_name }} @ ${{ github.sha }}"
          else
            echo "❌ Backend deployment failed for ${{ github.ref_name }} @ ${{ github.sha }}"
          fi

  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run security audit
        run: |
          composer audit
          npm audit --audit-level moderate

      - name: Run PHP security check
        run: |
          composer require --dev enlightn/security-checker
          ./vendor/bin/security-checker security:check

  performance-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: Performance test
        run: |
          # Test API response times
          ./vendor/bin/phpunit --filter=PerformanceTest

          # Test database performance (if seeder exists)
          php artisan db:seed --class=PerformanceTestSeeder || echo "PerformanceTestSeeder not found, skipping..."

          # Run performance benchmarks (if command exists)
          php artisan benchmark:run || echo "benchmark:run command not found, skipping..."
