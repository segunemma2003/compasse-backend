# Nginx config for compasse.net root domain only.
# Tenant subdomains (*.compasse.net) are handled by nginx-tenants.conf with a wildcard cert.
# api.compasse.net is handled by nginx-api-compasse.conf.

# ── HTTP → HTTPS (root domain only) ──────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name compasse.net www.compasse.net;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS – Root domain (marketing + super admin portal) ─────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name compasse.net www.compasse.net;

    ssl_certificate     /etc/letsencrypt/live/compasse.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compasse.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    root  /var/www/compasse-frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    access_log /var/log/nginx/compasse-frontend-access.log;
    error_log  /var/log/nginx/compasse-frontend-error.log warn;
}
