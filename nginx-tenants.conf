# Nginx config for tenant subdomains: *.compasse.net
# Serves the same React SPA for every school subdomain.
# Wildcard cert: /home/deploy/ssl/ (issued via acme.sh)

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?!api\.)(?!www\.)(?<subdomain>.+)\.compasse\.net$;

    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?!api\.)(?!www\.)(?<subdomain>.+)\.compasse\.net$;

    ssl_certificate     /etc/letsencrypt/live/compasse-wildcard/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/compasse-wildcard/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;
    ssl_session_tickets       off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root  /var/www/compasse-frontend/dist;
    index index.html;

    access_log /var/log/nginx/tenants-ssl-access.log;
    error_log  /var/log/nginx/tenants-ssl-error.log;

    # React SPA — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache Vite-fingerprinted assets
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    location ~ /\.(?!well-known) { deny all; }
}
